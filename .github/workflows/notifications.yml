name: Run Notification Cron

on:
  schedule:
    # 🕒 6:00 AM IST -> morning slot
    - cron: "30 0 * * *"
    # 🕒 6:00 PM IST -> evening slot
    - cron: "30 12 * * *"

  workflow_dispatch:
    inputs:
      slot:
        description: "Notification slot to run (manual trigger only)"
        required: false
        default: "morning"
        type: choice
        options:
          - morning
          - evening

jobs:
  run-cron:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Notification Job
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          FCM_SERVICE_ACCOUNT_JSON: ${{ secrets.FCM_SERVICE_ACCOUNT_JSON }}
          # GitHub Actions is the single source of truth for which slot is
          # running -- it knows which schedule entry fired (or which slot
          # a manual run requested), so the scheduler never has to guess
          # from the clock.
          NOTIFICATION_SLOT: ${{ (github.event.schedule == '30 0 * * *' && 'morning') || (github.event.schedule == '30 12 * * *' && 'evening') || github.event.inputs.slot || 'skip' }}

        run: |
          python - <<EOF
          from factory import create_app
          from services.event_scheduler import run_daily_event_job

          app = create_app()

          with app.app_context():
              run_daily_event_job()
          EOF
