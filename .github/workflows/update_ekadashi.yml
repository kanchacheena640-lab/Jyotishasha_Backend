name: Auto Update Ekadashi Data
on:
  schedule:
    # Ye har saal 1st January ko midnight (UTC) par apne aap chalega
    - cron: '0 0 1 1 *'
  workflow_dispatch: # Isse aap 'Actions' tab se kabhi bhi manually chala sakte hain

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Generation Script
        run: python scripts/generate_ekadashi_year.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/ekadashi/*.json
          git commit -m "Auto-update Ekadashi JSON for new year" || echo "No changes to commit"
          git push